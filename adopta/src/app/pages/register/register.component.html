<div class="min-vh-100 d-flex align-items-center justify-content-center py-5" style="background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%)">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-5">

        <div class="text-center mb-4">
          <i class="bi bi-heart-fill text-primary" style="font-size: 2.5rem"></i>
          <h1 class="fw-bold mt-2" style="color: #7C3AED">Adopta</h1>
          <p class="text-muted">Crie sua conta e encontre seu pet ideal</p>
        </div>

        <div class="card p-4">
          @if (error) {
            <div class="alert alert-danger py-2">{{ error }}</div>
          }

          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label fw-semibold">Nome completo</label>
              <input type="text" class="form-control" [(ngModel)]="name"
                name="name" placeholder="Seu nome" required />
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">E-mail</label>
              <input type="email" class="form-control" [(ngModel)]="email"
                name="email" placeholder="seu@email.com" required />
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Senha</label>
              <input type="password" class="form-control" [(ngModel)]="password"
                name="password" placeholder="Mínimo 6 caracteres" required />
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" [disabled]="loading">
              @if (loading) {
                <span class="spinner-border spinner-border-sm me-2"></span>
              }
              Criar conta
            </button>
          </form>

          <div class="d-flex align-items-center my-3">
            <hr class="flex-grow-1" />
            <span class="px-2 text-muted small">ou</span>
            <hr class="flex-grow-1" />
          </div>

          <button class="btn btn-outline-secondary w-100 py-2" (click)="googleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" class="me-2" />
            Entrar com Google
          </button>

          <p class="text-center mt-3 mb-0 text-muted small">
            Já tem conta? <a routerLink="/login" class="text-primary fw-semibold">Entrar</a>
          </p>
        </div>

      </div>
    </div>
  </div>
</div>
