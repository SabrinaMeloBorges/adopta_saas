<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-7">
      <h2 class="fw-bold mb-4">Cadastrar pet para adoção</h2>

      <div class="card p-4">
        @if (error) {
          <div class="alert alert-danger">{{ error }}</div>
        }

        <form (ngSubmit)="onSubmit()">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">Nome do pet</label>
              <input type="text" class="form-control" [(ngModel)]="pet.name" name="name" required />
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Espécie</label>
              <select class="form-select" [(ngModel)]="pet.species" name="species">
                <option value="dog">Cachorro</option>
                <option value="cat">Gato</option>
                <option value="other">Outro</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Raça</label>
              <input type="text" class="form-control" [(ngModel)]="pet.breed" name="breed" placeholder="SRD se não souber" />
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Idade (anos)</label>
              <input type="number" class="form-control" [(ngModel)]="pet.age" name="age" min="0" max="30" />
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Sexo</label>
              <select class="form-select" [(ngModel)]="pet.gender" name="gender">
                <option value="male">Macho</option>
                <option value="female">Fêmea</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">Descrição</label>
              <textarea class="form-control" rows="4" [(ngModel)]="pet.description" name="description"
                placeholder="Conte sobre a personalidade, histórico e necessidades do pet..."></textarea>
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">Foto do pet</label>
              <input type="file" class="form-control" accept="image/*" (change)="onFileChange($event)" />
            </div>

            <div class="col-12">
              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" [disabled]="loading">
                @if (loading) { <span class="spinner-border spinner-border-sm me-2"></span> }
                Cadastrar pet
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
